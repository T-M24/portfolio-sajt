<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teodora Portfolio</title>
    <link href="style.css" , rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <!-- NAV DEO -->
    <!-- linkujem ka top stranici posle nemoj da zab! -->
    <a href="#" class="nav-logo">TM</a>
    <ul class="nav-links">
      <li>Radovi</li>
      <li>O meni</li>
      <li>Kontakt</li>
    </ul>

    <section class="hero">
      <div class="hero-left">
        <div class="hero-tag">grafički dizajn kao hobi</div>
        <h1>Manjenčić <em>Teodora</em></h1>
        <p class="hero-sub">
          Uzimam inspiraciju iz svakodnevnog života i stvari koje volim. Ogromna
          inspiracija su mi muzika, moda i ostale šarene i živopisne stvari oko
          nas.
        </p>
        <div class="hero-actions">
          <a href="#work" class="btn-primary">Radovi</a>
          <a href="#about" class="btn-ghost">O meni</a>
        </div>
      </div>
      <div class="hero-right">
        <div class="hero-mosaic-item">
          <div class="mock-poster mp1">
            <img
              src="media/lanci ljubavi.png"
              style="width: 100%; height: 100%; object-fit: cover"
            />
          </div>
          <div class="mosaic-overlay"><span>Poster</span></div>
        </div>
        <div class="hero-mosaic-item">
          <div class="mock-poster mp2">
            <img
              src="media/pozivnica jubilej.png"
              style="width: 100%; height: 100%; object-fit: cover"
            />
            <div class="mp2-inner">
              <div class="mp2 spacer"></div>
            </div>
          </div>
          <div class="mosaic-overlay"><span>Pozivnica</span></div>
        </div>
        <div class="hero-mosaic-item">
          <div class="mock-poster mp3">
            <div class="mp3-inner">
              <div style="text-align: center"></div>
              <img
                src="media/fondacijaPrepravljeno.png"
                style="width: 100%; height: 100%; object-fit: cover"
              />
            </div>
          </div>
          <div class="mosaic-overlay"><span>Instagram</span></div>
        </div>
        <div class="hero-mosaic-item">
          <div class="mock-poster mp4">
            <div class="mp4-inner">
              <img
                src="media/silent kendi.png"
                style="width: 100%; height: 100%; object-fit: cover"
              />
            </div>
          </div>
          <div class="mosaic-overlay"><span>Poster</span></div>
        </div>
      </div>
    </section>
  </body>
</html>
